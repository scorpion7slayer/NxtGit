name: "Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.result }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Draft Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.get-version.outputs.version }}`,
              name: `NxtGit v${{ steps.get-version.outputs.version }}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true
            })
            return data.id

  publish-tauri:
    permissions:
      contents: write
    needs: create-release
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          # macOS — Apple Silicon
          - platform: "macos-26"
            args: "--target aarch64-apple-darwin --bundles app,dmg"
            target: "aarch64-apple-darwin"
          # macOS — Intel
          - platform: "macos-15-intel"
            args: "--target x86_64-apple-darwin --bundles app,dmg"
            target: "x86_64-apple-darwin"
          # Linux — x64 (deb)
          - platform: "ubuntu-22.04"
            args: "--bundles deb"
            target: "x86_64-unknown-linux-gnu"
          # Linux — x64 (AppImage)
          - platform: "ubuntu-24.04"
            args: "--bundles appimage"
            target: "x86_64-unknown-linux-gnu"
          # Linux — ARM64
          - platform: "ubuntu-24.04-arm"
            args: "--bundles deb,appimage"
            target: "aarch64-unknown-linux-gnu"
          # Windows — x64
          - platform: "windows-latest"
            args: "--target x86_64-pc-windows-msvc --bundles msi,nsis"
            target: "x86_64-pc-windows-msvc"
          # Windows — x86 (32-bit)
          - platform: "windows-latest"
            args: "--target i686-pc-windows-msvc --bundles msi,nsis"
            target: "i686-pc-windows-msvc"
          # Windows — ARM64
          - platform: "windows-11-arm"
            args: "--target aarch64-pc-windows-msvc --bundles nsis"
            target: "aarch64-pc-windows-msvc"

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      upload-artifacts: false
      release-id: ${{ needs.create-release.outputs.release-id }}
    secrets: inherit

  verify-updater-assets:
    permissions:
      contents: write
    needs:
      - create-release
      - publish-tauri
    if: needs.publish-tauri.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Verify updater assets on draft release
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = Number('${{ needs.create-release.outputs.release-id }}')
            const { data } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId
            })

            const assetNames = data.assets.map((asset) => asset.name)
            const hasLatestJson = assetNames.includes('latest.json')
            const signatureCount = assetNames.filter((name) => name.endsWith('.sig')).length
            const hasMacDmg = assetNames.some((name) => name.endsWith('.dmg'))
            const hasWindowsX64 = assetNames.some((name) => name.includes('_x64-setup.exe') || name.includes('_x64_en-US.msi'))
            const hasWindowsX86 = assetNames.some((name) => name.includes('_x86-setup.exe') || name.includes('_x86_en-US.msi'))
            const hasWindowsArm64 = assetNames.some((name) => name.includes('_arm64-setup.exe') || name.includes('_arm64_en-US.msi'))
            const hasLinuxX64 = assetNames.some((name) => name.includes('_amd64.deb') || name.includes('_amd64.AppImage'))
            const hasLinuxArm64 = assetNames.some((name) => name.includes('_arm64.deb') || name.includes('_aarch64.AppImage'))

            core.info(`Release assets: ${assetNames.join(', ')}`)

            if (!hasLatestJson) {
              core.setFailed('Missing latest.json on the draft release. The updater will not work.')
              return
            }

            if (signatureCount === 0) {
              core.setFailed('No updater signature assets were uploaded. The updater will not work.')
              return
            }

            if (!hasMacDmg) {
              core.setFailed('Missing macOS .dmg asset on the draft release.')
              return
            }

            if (!hasWindowsX64 || !hasWindowsX86 || !hasWindowsArm64) {
              core.setFailed('Missing one or more Windows assets (x64, x86, ARM64).')
              return
            }

            if (!hasLinuxX64 || !hasLinuxArm64) {
              core.setFailed('Missing one or more Linux assets (x64, ARM64).')
            }

  publish-release:
    permissions:
      contents: write
    needs:
      - create-release
      - publish-tauri
      - verify-updater-assets
    if: needs.publish-tauri.result == 'success' && needs.verify-updater-assets.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number('${{ needs.create-release.outputs.release-id }}'),
              draft: false,
              prerelease: false
            })
