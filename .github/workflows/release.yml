name: "Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.result }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Draft Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.get-version.outputs.version }}`,
              name: `NxtGit v${{ steps.get-version.outputs.version }}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true
            })
            return data.id

  publish-tauri:
    permissions:
      contents: write
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Apple Silicon
          - platform: "macos-26"
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          # macOS — Intel
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
          # Linux — x64 (deb)
          - platform: "ubuntu-22.04"
            args: "--bundles deb"
            target: "x86_64-unknown-linux-gnu"
          # Linux — x64 (AppImage)
          - platform: "ubuntu-24.04"
            args: "--bundles appimage"
            target: "x86_64-unknown-linux-gnu"
          # Linux — ARM64
          - platform: "ubuntu-24.04-arm"
            args: "--bundles deb,appimage"
            target: "aarch64-unknown-linux-gnu"
          # Windows — x64
          - platform: "windows-latest"
            args: "--target x86_64-pc-windows-msvc --bundles msi,nsis"
            target: "x86_64-pc-windows-msvc"
          # Windows — x86 (32-bit)
          - platform: "windows-latest"
            args: "--target i686-pc-windows-msvc --bundles msi,nsis"
            target: "i686-pc-windows-msvc"
          # Windows — ARM64
          - platform: "windows-latest"
            args: "--target aarch64-pc-windows-msvc --bundles nsis"
            target: "aarch64-pc-windows-msvc"

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      upload-artifacts: false
      release-id: ${{ needs.create-release.outputs.release-id }}
    secrets: inherit
