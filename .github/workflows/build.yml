name: "Build"

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      target:
        required: true
        type: string
      build-args:
        required: false
        type: string
        default: ""
      release-id:
        required: false
        type: string
      upload-artifacts:
        required: false
        type: boolean
        default: true

jobs:
  build:
    permissions:
      contents: write
    runs-on: ${{ inputs.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install system dependencies (Ubuntu)
        if: contains(inputs.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev libgtk-layer-shell-dev

      - name: Install node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Add Rust target
        if: inputs.target != ''
        run: rustup target add ${{ inputs.target }}

      - name: Add ARM Linux Rust target
        if: inputs.target == 'armv7-unknown-linux-gnueabihf'
        run: rustup target add armv7-unknown-linux-gnueabihf

      # if you use an App Store Connect API key, write it to disk first
      - name: Prepare Apple API key (optional)
        run: |
          if [ -n "${{ secrets.APPLE_API_KEY_CONTENT }}" ]; then
            mkdir -p ~/.appstoreconnect/private_keys
            echo "${{ secrets.APPLE_API_KEY_CONTENT }}" \
              > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
          fi

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # frontend env vars
          VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}

          # code‑signing certificate (base64‑encoded .p12)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

          # notarization credentials (choose one method)
          # set the classic Apple ID/password/team trio:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # or, if using an API key, the action will look in the default
          # ~/.appstoreconnect/private_keys directory we created above.
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
        with:
          releaseId: ${{ inputs.release-id }}
          args: ${{ inputs.build-args }}

      - name: Upload artifacts (macOS)
        if: inputs.upload-artifacts && contains(inputs.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: nxtgit-${{ inputs.platform }}-${{ inputs.target }}
          path: |
            src-tauri/target/${{ inputs.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ inputs.target }}/release/bundle/macos/*.app
          retention-days: 7

      - name: Upload artifacts (Linux)
        if: inputs.upload-artifacts && contains(inputs.platform, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: nxtgit-${{ inputs.platform }}-${{ inputs.target }}
          path: |
            src-tauri/target/${{ inputs.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ inputs.target }}/release/bundle/appimage/*.AppImage
          retention-days: 7

      - name: Upload artifacts (Windows)
        if: inputs.upload-artifacts && contains(inputs.platform, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: nxtgit-${{ inputs.platform }}-${{ inputs.target }}
          path: |
            src-tauri/target/${{ inputs.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ inputs.target }}/release/bundle/nsis/*.exe
          retention-days: 7
