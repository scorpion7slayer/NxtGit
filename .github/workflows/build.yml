name: "Build"

on:
    workflow_call:
        inputs:
            platform:
                required: true
                type: string
            target:
                required: true
                type: string
            build-args:
                required: false
                type: string
                default: ""
            release-id:
                required: false
                type: string
            upload-artifacts:
                required: false
                type: boolean
                default: true

jobs:
    build:
        permissions:
            contents: write
        runs-on: ${{ inputs.platform }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Get version from tauri.conf.json
              id: get-version
              shell: bash
              run: |
                  VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "22"

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: "./src-tauri -> target"
                  key: ${{ inputs.platform }}-${{ inputs.target }}

            - name: Install system dependencies (Ubuntu x64)
              if: contains(inputs.platform, 'ubuntu') && !contains(inputs.platform, 'arm')
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev libgtk-layer-shell-dev

            - name: Install system dependencies (Ubuntu ARM64)
              if: contains(inputs.platform, 'ubuntu-24.04-arm')
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev libgtk-layer-shell-dev xdg-utils

            - name: Install node dependencies
              shell: bash
              run: |
                  for attempt in 1 2 3; do
                    if npm ci --no-audit; then
                      exit 0
                    fi
                    echo "npm ci failed on attempt ${attempt}"
                    if [ "$attempt" -lt 3 ]; then
                      npm cache verify || true
                      sleep 10
                    fi
                  done
                  exit 1

            - name: Validate updater public key
              if: inputs.release-id != ''
              env:
                  TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
              shell: bash
              run: |
                  if [ -z "$TAURI_SIGNING_PUBLIC_KEY" ]; then
                    echo "::error::Missing TAURI_SIGNING_PUBLIC_KEY secret."
                    exit 1
                  fi

            - name: Inject updater public key
              if: inputs.release-id != ''
              env:
                  TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
              run: |
                  node -e "const fs=require('fs'); const path='src-tauri/tauri.conf.json'; const config=JSON.parse(fs.readFileSync(path, 'utf8')); config.plugins ??= {}; config.plugins.updater ??= {}; config.plugins.updater.pubkey = process.env.TAURI_SIGNING_PUBLIC_KEY; fs.writeFileSync(path, JSON.stringify(config, null, 2) + '\n');"

            - name: Build frontend
              run: npm run build

            - name: Add Rust target
              if: inputs.target != '' && !contains(inputs.target, 'x86_64-unknown-linux-gnu') && !contains(inputs.target, 'aarch64-unknown-linux-gnu')
              run: rustup target add ${{ inputs.target }}

            - name: Import Apple Developer Certificate
              if: contains(inputs.platform, 'macos')
              env:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
              run: |
                  if [ -z "$APPLE_CERTIFICATE" ]; then
                    echo "::error::Missing APPLE_CERTIFICATE secret."
                    exit 1
                  fi

                  if [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
                    echo "::error::Missing APPLE_CERTIFICATE_PASSWORD secret."
                    exit 1
                  fi

                  if [ -z "$KEYCHAIN_PASSWORD" ]; then
                    echo "::error::Missing KEYCHAIN_PASSWORD secret."
                    exit 1
                  fi

                  if ! printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12 2>/dev/null; then
                    if ! printf '%s' "$APPLE_CERTIFICATE" | base64 -D > certificate.p12 2>/dev/null; then
                      echo "::error::APPLE_CERTIFICATE is not valid base64 for a .p12 certificate."
                      exit 1
                    fi
                  fi

                  if [ ! -s certificate.p12 ]; then
                    echo "::error::Decoded certificate.p12 is empty."
                    exit 1
                  fi

                  security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
                  security default-keychain -s build.keychain
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
                  security set-keychain-settings -t 3600 -u build.keychain
                  security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
                  security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

            - name: Verify Apple certificate
              if: contains(inputs.platform, 'macos')
              run: |
                  CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
                  CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
                  echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV
                  echo "Certificate imported: $CERT_ID"

            - name: Build with Tauri (macOS notarized, Apple Silicon)
              id: build-notarized
              if: contains(inputs.platform, 'macos') && inputs.target == 'aarch64-apple-darwin'
              continue-on-error: true
              timeout-minutes: 30
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  releaseId: ${{ inputs.release-id }}
                  tagName: v${{ steps.get-version.outputs.version }}
                  includeUpdaterJson: true
                  args: ${{ inputs.build-args }}

            - name: Build with Tauri (macOS notarized, Intel)
              id: build-notarized-intel
              if: contains(inputs.platform, 'macos') && inputs.target == 'x86_64-apple-darwin'
              continue-on-error: true
              timeout-minutes: 45
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  releaseId: ${{ inputs.release-id }}
                  tagName: v${{ steps.get-version.outputs.version }}
                  includeUpdaterJson: true
                  args: ${{ inputs.build-args }}

            - name: Build with Tauri
              if: ${{ !contains(inputs.platform, 'macos') }}
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  releaseId: ${{ inputs.release-id }}
                  tagName: v${{ steps.get-version.outputs.version }}
                  includeUpdaterJson: true
                  args: ${{ inputs.build-args }}

            # Fallback: if macOS build failed (notarization timeout), rebuild signed-only
            - name: Build with Tauri (signed only, no notarization)
              if: contains(inputs.platform, 'macos') && (steps.build-notarized.outcome == 'failure' || steps.build-notarized-intel.outcome == 'failure')
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  releaseId: ${{ inputs.release-id }}
                  tagName: v${{ steps.get-version.outputs.version }}
                  includeUpdaterJson: true
                  args: ${{ inputs.build-args }}

            - name: Summarize macOS signed-only fallback
              if: contains(inputs.platform, 'macos') && (steps.build-notarized.outcome == 'failure' || steps.build-notarized-intel.outcome == 'failure')
              shell: bash
              run: |
                  {
                    echo "### macOS notarization fallback"
                    echo ""
                    echo "The notarized macOS build did not finish within 15 minutes, so the uploaded artifact is Developer ID signed but may not be notarized yet."
                    echo "If Gatekeeper blocks launch, users can allow NxtGit from System Settings > Privacy & Security."
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Upload artifacts (macOS)
              if: inputs.upload-artifacts && contains(inputs.platform, 'macos')
              uses: actions/upload-artifact@v6
              with:
                  name: nxtgit-${{ inputs.platform }}-${{ inputs.target }}
                  path: |
                      src-tauri/target/${{ inputs.target }}/release/bundle/dmg/*.dmg
                      src-tauri/target/${{ inputs.target }}/release/bundle/macos/*.app
                  retention-days: 7

            - name: Upload artifacts (Linux)
              if: inputs.upload-artifacts && contains(inputs.platform, 'ubuntu')
              uses: actions/upload-artifact@v6
              with:
                  name: nxtgit-${{ inputs.platform }}-${{ inputs.target }}
                  path: |
                      src-tauri/target/${{ inputs.target }}/release/bundle/deb/*.deb
                      src-tauri/target/${{ inputs.target }}/release/bundle/appimage/*.AppImage
                  retention-days: 7

            - name: Upload artifacts (Windows)
              if: inputs.upload-artifacts && contains(inputs.platform, 'windows')
              uses: actions/upload-artifact@v6
              with:
                  name: nxtgit-${{ inputs.platform }}-${{ inputs.target }}
                  path: |
                      src-tauri/target/${{ inputs.target }}/release/bundle/msi/*.msi
                      src-tauri/target/${{ inputs.target }}/release/bundle/nsis/*.exe
                  retention-days: 7
