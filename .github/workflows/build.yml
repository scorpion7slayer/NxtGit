name: "Build"

on:
    workflow_call:
        inputs:
            platform:
                required: true
                type: string
            target:
                required: true
                type: string
            build-args:
                required: false
                type: string
                default: ""
            release-id:
                required: false
                type: string
            upload-artifacts:
                required: false
                type: boolean
                default: true

jobs:
    build:
        permissions:
            contents: write
        runs-on: ${{ inputs.platform }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Get version from tauri.conf.json
              id: get-version
              shell: bash
              run: |
                  VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: "./src-tauri -> target"
                  key: ${{ inputs.platform }}-${{ inputs.target }}

            - name: Install system dependencies (Ubuntu x64)
              if: contains(inputs.platform, 'ubuntu') && !contains(inputs.platform, 'arm')
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev libgtk-layer-shell-dev

            - name: Install system dependencies (Ubuntu ARM64)
              if: contains(inputs.platform, 'ubuntu-24.04-arm')
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev libgtk-layer-shell-dev xdg-utils

            - name: Install node dependencies
              run: npm ci

            - name: Build frontend
              run: npm run build

            - name: Add Rust target
              if: inputs.target != '' && !contains(inputs.target, 'x86_64-unknown-linux-gnu') && !contains(inputs.target, 'aarch64-unknown-linux-gnu')
              run: rustup target add ${{ inputs.target }}

            - name: Import Apple Developer Certificate
              if: contains(inputs.platform, 'macos')
              env:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
              run: |
                  echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
                  security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
                  security default-keychain -s build.keychain
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
                  security set-keychain-settings -t 3600 -u build.keychain
                  security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
                  security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

            - name: Verify Apple certificate
              if: contains(inputs.platform, 'macos')
              run: |
                  CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
                  CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
                  echo "CERT_ID=$CERT_ID" >> $GITHUB_ENV
                  echo "Certificate imported: $CERT_ID"

            - name: Build with Tauri
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

                  # frontend env vars
                  VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}

                  # macOS code signing & notarization
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: ${{ env.CERT_ID }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              with:
                  releaseId: ${{ inputs.release-id }}
                  args: ${{ inputs.build-args }}

            - name: Upload artifacts (macOS)
              if: inputs.upload-artifacts && contains(inputs.platform, 'macos')
              uses: actions/upload-artifact@v4
              with:
                  name: nxtgit-${{ inputs.platform }}-${{ inputs.target }}
                  path: |
                      src-tauri/target/${{ inputs.target }}/release/bundle/dmg/*.dmg
                      src-tauri/target/${{ inputs.target }}/release/bundle/macos/*.app
                  retention-days: 7

            - name: Upload artifacts (Linux)
              if: inputs.upload-artifacts && contains(inputs.platform, 'ubuntu')
              uses: actions/upload-artifact@v4
              with:
                  name: nxtgit-${{ inputs.platform }}-${{ inputs.target }}
                  path: |
                      src-tauri/target/${{ inputs.target }}/release/bundle/deb/*.deb
                      src-tauri/target/${{ inputs.target }}/release/bundle/appimage/*.AppImage
                  retention-days: 7

            - name: Upload artifacts (Windows)
              if: inputs.upload-artifacts && contains(inputs.platform, 'windows')
              uses: actions/upload-artifact@v4
              with:
                  name: nxtgit-${{ inputs.platform }}-${{ inputs.target }}
                  path: |
                      src-tauri/target/${{ inputs.target }}/release/bundle/msi/*.msi
                      src-tauri/target/${{ inputs.target }}/release/bundle/nsis/*.exe
                  retention-days: 7
